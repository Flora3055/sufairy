<!doctype html>
<html>
<head>
    <title>美容沙龍</title>
    <meta http-equiv="X-UA-Compatible" content="IE=Edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="content-type" content="text/html; charset=UTF-8"/>

    <!-- 纯净样式：隐藏所有 Wix 元素、logo、弹窗 -->
    <style>
        /* 隐藏 Wix 顶部工具栏 */
        [data-hook="tool-bar"], .sbWfkE, .Mn4893, .TYXuEX {
            display: none !important;
            visibility: hidden !important;
            height: 0 !important;
            overflow: hidden !important;
        }

        /* 隐藏 Wix logo */
        [data-hook="logo"], .nHuSJZ, .AV8G6s {
            display: none !important;
        }

        /* 隐藏弹窗、信息卡片 */
        [data-hook="info-pop-up"], .M05QSQ, .gDaLU4, .E0wHmq {
            display: none !important;
        }

        /* 隐藏编辑按钮、推广按钮 */
        [data-hook="editor-link"], .Ydu4WK, .XpwCp3, .bggdgE {
            display: none !important;
        }

        /* 让网站 iframe 铺满全屏 */
        html, body {
            margin: 0 !important;
            padding: 0 !important;
            height: 100% !important;
            overflow: hidden !important;
        }
        #root, [data-hook="app"], [data-hook="template-demo"],
        .CJ4D6R, .Woz8P7, .eZTjsa {
            display: block !important;
            width: 100% !important;
            height: 100vh !important;
            border: none !important;
            margin: 0 !important;
            padding: 0 !important;
            overflow: hidden !important;
        }
    </style>
</head>
<body>

<div id="root">
    <span class="wds_1_186_1_newColorsBranding__root">
        <div data-hook="app">
            <div data-hook="template-demo">
                <div data-hook="desktop-view">
                    <!-- 美容沙龙网站本体 -->
                    <iframe 
                        data-hook="desktop-iframe" 
                        src="https://www.wix.com/demone2/beauty-salon" 
                        title="美容沙龍" 
                        width="100%" 
                        height="100%"
                        frameborder="0"
                        allowfullscreen>
                    </iframe>
                </div>
            </div>
        </div>
    </span>
</div>

</body>
</html>
