backend:
  name: github
  repo: Flora3055/sufairy  
  branch: main
  base_url: https://api.github.com

media_folder: "images/uploads"  
public_folder: "/images/uploads"

collections:
  - name: "pages"
    label: "女충코휭"
    files:
      - name: "index"
        label: "看女"
        file: "index.html"
        fields:
          - {label: "女충깃痙", name: "title", widget: "string"}
          - {label: "女충췄甘", name: "description", widget: "text"}
          - {label: "끓틔죗깊", name: "products", widget: "list", fields: [
              {label: "끓틔츰냔", name: "name", widget: "string"},
              {label: "끓틔송목", name: "price", widget: "string"},
              {label: "끓틔暠튬", name: "image", widget: "image"},
              {label: "끓틔췄甘", name: "desc", widget: "text"}
            ]}